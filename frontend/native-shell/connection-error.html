<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f48ba4" />
    <title>Maia indisponível</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
        background: #fffafa;
        color: #393738;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: #646162;
        line-height: 1.6;
      }

      button {
        min-height: 52px;
        margin-top: 24px;
        padding: 0 24px;
        border: 0;
        border-radius: 999px;
        background: #f48ba4;
        color: white;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Não foi possível abrir o Maia</h1>
      <p>Verifique sua conexão e confirme se o servidor configurado está disponível.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
