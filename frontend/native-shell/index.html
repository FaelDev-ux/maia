<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f48ba4" />
    <title>Maia</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #fffafa;
        color: #393738;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        background: #fffafa;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 112px;
        height: 112px;
        object-fit: contain;
      }

      h1 {
        margin: 20px 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #646162;
        font-size: 16px;
        line-height: 1.6;
      }

      code {
        display: block;
        margin-top: 20px;
        padding: 14px;
        overflow-wrap: anywhere;
        border-radius: 12px;
        background: #ede6e8;
        color: #8c4054;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./logo-maia.png" alt="Maia" />
      <h1>Maia</h1>
      <p>
        O container nativo está instalado. Defina uma URL de desenvolvimento antes de sincronizar
        para carregar o frontend Next.js.
      </p>
      <code>$env:CAPACITOR_SERVER_URL="http://SEU-IP:3000"; npm run cap:sync</code>
    </main>
  </body>
</html>
